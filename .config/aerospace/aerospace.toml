# =========================
# AeroSpace config
# =========================
#
# Workspace archetypes
#
# Archetype 1 — Deep Work
# 0 = Neovide
# 1 = Ghostty
#
# Archetype 2 — Planning / Comms
# 2 = Calendar
# 3 = Mail
# 4 = Notes
#
# Archetype 3 — Research / Production
# 5 = ChatGPT
# 6 = Gemini
# 7 = Safari / browsing / research
# 8 = Finder
# 9 = Microsoft Office
#
# Behavioural intent
#
# Archetype 1 — Deep Work
# - one anchor app per workspace
# - minimal context switching
# - optimise for immersion and execution
#
# Archetype 2 — Planning / Comms
# - short visits
# - scheduling, coordination, inbox, capture
# - lightweight support work, not main production work
#
# Archetype 3 — Research / Production
# - lateral movement across tools is expected
# - research, synthesis, file handling, writing, deck/doc production
# - optimise for turning inputs into outputs
#
# Design intent
# - Keep primary apps on fixed workspaces
# - Prefer maximised tiling over macOS native fullscreen
# - Keep utility/comms apps floating unless explicitly promoted later
# - Preserve predictable muscle memory over novelty
#
# Change discipline
# 1. Edit this file
# 2. Validate first:
#    aerospace reload-config --dry-run
# 3. If valid, reload:
#    aerospace reload-config

# =========================
# Core defaults
# =========================

# SketchyBar integration
exec-on-workspace-change = [
  '/bin/bash',
  '-lc',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE="$AEROSPACE_FOCUSED_WORKSPACE"'
]

# Global tiling defaults
# Root layout stays simple and predictable.
default-root-container-layout = "tiles"
default-root-container-orientation = "horizontal"

# Normalisation keeps nested containers sane.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

[gaps]
outer.top = 40

# =========================
# Archetype 1 — Deep Work
# =========================
# One primary app per workspace.
# Tiled and effectively maximised by owning the workspace.

[[on-window-detected]]
if.app-id = 'com.neovide.neovide'
run = ['move-node-to-workspace 0', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 1', 'layout tiles']

# =========================
# Archetype 2 — Planning / Comms
# =========================
# Sequential support spaces for planning and coordination.

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = ['move-node-to-workspace 2', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 3', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = ['move-node-to-workspace 4', 'layout tiles']

# =========================
# Archetype 3 — Research / Production
# =========================
# Sequential spaces for synthesis, browsing, file navigation, and output creation.

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = ['move-node-to-workspace 5', 'layout tiles']

[[on-window-detected]]
if.app-name-regex-substring = 'Gemini'
run = ['move-node-to-workspace 6', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['move-node-to-workspace 7', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['move-node-to-workspace 8', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.microsoft.Powerpoint'
run = ['move-node-to-workspace 9', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.microsoft.Word'
run = ['move-node-to-workspace 9', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.microsoft.Excel'
run = ['move-node-to-workspace 9', 'layout tiles']

# =========================
# Floating utility / comms apps
# =========================
# These remain floating by design.
# They support the main archetypes without claiming fixed workspaces.
# Promote any of these later only if repeated usage proves it is worth it.

[[on-window-detected]]
if.app-id = 'com.apple.AddressBook'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Dictionary'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.QuickTimePlayerX'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Photos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'layout floating'

# =========================
# Keybindings (HYPER)
# Caps Lock via Karabiner = ctrl+alt+cmd+shift
# =========================

[mode.main.binding]

# Toggle fullscreen / tiled
ctrl-alt-cmd-shift-enter = "fullscreen"

# Toggle floating / tiling
ctrl-alt-cmd-shift-t = "layout floating tiling"

# Focus movement
ctrl-alt-cmd-shift-h = "focus left"
ctrl-alt-cmd-shift-l = "focus right"
ctrl-alt-cmd-shift-k = "focus up"
ctrl-alt-cmd-shift-j = "focus down"

# Move windows within layout
# Hyper+Shift is not available, so use u/i/o/p
ctrl-alt-cmd-shift-u = "move left"
ctrl-alt-cmd-shift-p = "move right"
ctrl-alt-cmd-shift-o = "move up"
ctrl-alt-cmd-shift-i = "move down"

# Workspace switching
ctrl-alt-cmd-shift-1 = "workspace 1"
ctrl-alt-cmd-shift-2 = "workspace 2"
ctrl-alt-cmd-shift-3 = "workspace 3"
ctrl-alt-cmd-shift-4 = "workspace 4"
ctrl-alt-cmd-shift-5 = "workspace 5"
ctrl-alt-cmd-shift-6 = "workspace 6"
ctrl-alt-cmd-shift-7 = "workspace 7"
ctrl-alt-cmd-shift-8 = "workspace 8"
ctrl-alt-cmd-shift-9 = "workspace 9"
ctrl-alt-cmd-shift-0 = "workspace 0"

# Move active window to a workspace (no auto-switch)
ctrl-alt-cmd-shift-z = "move-node-to-workspace 1"
ctrl-alt-cmd-shift-x = "move-node-to-workspace 2"
ctrl-alt-cmd-shift-c = "move-node-to-workspace 3"
ctrl-alt-cmd-shift-v = "move-node-to-workspace 4"
ctrl-alt-cmd-shift-b = "move-node-to-workspace 5"
ctrl-alt-cmd-shift-n = "move-node-to-workspace 6"
ctrl-alt-cmd-shift-m = "move-node-to-workspace 7"
ctrl-alt-cmd-shift-q = "move-node-to-workspace 8"
ctrl-alt-cmd-shift-w = "move-node-to-workspace 9"
ctrl-alt-cmd-shift-e = "move-node-to-workspace 0"

# =========================
# Resize mode (HYPER-s)
# =========================

# Enter resize mode
ctrl-alt-cmd-shift-s = "mode resize"

[mode.resize.binding]

# Exit resize mode
esc = "mode main"
enter = "mode main"
ctrl-alt-cmd-shift-s = "mode main"

# Resize active window (coarse)
h = "resize width -64"
l = "resize width +64"
j = "resize height +64"
k = "resize height -64"

# Resize active window (fine)
shift-h = "resize width -8"
shift-l = "resize width +8"
shift-j = "resize height +8"
shift-k = "resize height -8"